<!DOCTYPE html>
<html>
    <head>
        <title>s8shell</title>
        <meta name="viewport" content="width=device-width">
        <link href="./shell.css" rel="stylesheet"/>
        <style>
            html{
                background-color: grey;
            }
        </style>
    </head>
    <body>
        <!-- area to copy start -->
        <div name="console " id="terminal-container-window">
            <div id="terminal-title"><!-- terminal title is set via js --></div>

                    <p id="shellParagraph">                    
                        <input id="shellInput" autocomplete=off>
                    </p>
                </form>
            </div>
        </div>
        <!-- area to copy end -->
    <script src="./js/shell.js"></script> 
    </body>
</html>
